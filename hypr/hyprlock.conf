background {
    monitor =
    path = ~/Pictures/lockscreen.png
    blur_passes = 3
    blur_size = 8
    brightness = 0.5
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 1
    dots_size = 0.2
    outer_color = rgb(cdd6f4)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)
    placeholder_text = <i>Password</i>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(cdd6f4ff)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}
