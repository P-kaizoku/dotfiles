################
### MONITORS ###
################
monitor=,preferred,auto,1.25

###################
### MY PROGRAMS ###
###################
$terminal = ghostty
$fileManager = dolphin
$menu = rofi -show drun

#################
### AUTOSTART ###
#################
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = nm-applet
exec-once = blueman-applet
exec-once = hyprsunset -t 4500
exec-once = swww-daemon
exec-once = swww img ~/Pictures/samurai.png --transition-type fade --transition-duration 1
exec-once = waypaper --restore

###########
### MOD ###
###########
$mod = SUPER

##################
### KEYBINDINGS ###
##################

# General
bind = $mod, Return, exec, ghostty
bind = $mod, W, exec, firefox
bind = $mod, Q, killactive,
bind = $mod, Space, exec, rofi -show drun
bind = $mod, F, fullscreen,
bind = $mod, V, togglefloating,
bind = $mod, period, exec, rofi -show emoji
bind = $mod, F1, exec, ~/.config/hypr/keybinds.sh
bind = $mod, M, exit,

# Apps
bind = $mod SHIFT, W, exec, waypaper
bind = $mod SHIFT, P, exec, wlogout
bind = $mod SHIFT, N, exec, pkill hyprsunset || hyprsunset -t 3500

# Lock
bind = $mod, L, exec, hyprlock

# Focus
# bind = $mod, H, movefocus, l
# bind = $mod, , movefocus, r
# bind = $mod, K, movefocus, u
# bind = $mod, J, movefocus, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Screenshot
bind = , Print, exec, grimblast copysave area ~/Pictures/$(date +%s).png
bind = SHIFT, Print, exec, grimblast copy screen

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod ALT, mouse:272, resizewindow

# Media keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 2 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Gestures
gesture = 3, horizontal, workspace

###############
### GENERAL ###
###############
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    col.active_border = rgba(cdd6f4ff)
    col.inactive_border = rgba(313244ff)
    resize_on_border = true
    extend_border_grab_area = 10
}

##################
### DECORATION ###
##################
decoration {
    rounding = 0

    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
    }
}

##############
### LAYOUT ###
##############
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

windowrule {
    name = keybinds
    match:class = kitty
    match:title = Keybinds
    float = on
    size = 600 500
    center = on
    pin = on
}
########
### MISC ###
##########
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}
